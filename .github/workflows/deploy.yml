name: CI/CD Pipeline for Calculator App

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Run unit tests
      run: mvn test
      
    - name: Build with Maven
      run: mvn package -DskipTests
      
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
        
    - name: Build and push Docker image
      run: |
        SHORT_SHA=${GITHUB_SHA::7}
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/calculator-app:latest .
        docker tag ${{ secrets.DOCKERHUB_USERNAME }}/calculator-app:latest ${{ secrets.DOCKERHUB_USERNAME }}/calculator-app:$SHORT_SHA
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/calculator-app:latest
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/calculator-app:$SHORT_SHA
