name: CI/CD Pipeline for Calculator App

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 步骤1: 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 步骤2: 设置JDK环境
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 步骤3: 运行单元测试
      - name: Run unit tests
        run: mvn test

      # 步骤4: 打包应用
      - name: Build with Maven
        run: mvn package -DskipTests

      # 步骤5: 登录Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 步骤6: 构建并推送Docker镜像
      - name: Build and push Docker image
        run: |
          # 获取短commit SHA
          SHORT_SHA=$(git rev-parse --short HEAD)
          
          # 构建镜像
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/calculator-app:latest .
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/calculator-app:latest ${{ secrets.DOCKERHUB_USERNAME }}/calculator-app:$SHORT_SHA
          
          # 推送镜像
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/calculator-app:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/calculator-app:$SHORT_SHA
          
          echo "Pushed images with tags: latest, $SHORT_SHA"

