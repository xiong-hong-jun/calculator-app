name: CI/CD Pipeline for Calculator App

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 步骤1: 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 步骤2: 设置JDK环境
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 步骤3: 运行单元测试
      - name: Run unit tests
        run: mvn test

      # 步骤4: 打包应用
      - name: Build with Maven
        run: mvn package -DskipTests

      # 步骤5: 登录Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 步骤6: 构建并推送Docker镜像
      - name: Build and push Docker image
        run: |
          # 获取短commit SHA
          SHORT_SHA=$(git rev-parse --short HEAD)
          
          # 构建镜像
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/calculator-app:latest .
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/calculator-app:latest ${{ secrets.DOCKERHUB_USERNAME }}/calculator-app:$SHORT_SHA
          
          # 推送镜像
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/calculator-app:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/calculator-app:$SHORT_SHA
          
          echo "Pushed images with tags: latest, $SHORT_SHA"

      # 步骤7（可选）: SSH部署到远程服务器
      - name: Deploy to remote server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            # 登录Docker Hub
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            
            # 停止并删除旧容器
            docker stop calculator-app || true
            docker rm calculator-app || true
            
            # 删除旧镜像
            docker rmi ${{ secrets.DOCKERHUB_USERNAME }}/calculator-app:latest || true
            
            # 拉取新镜像
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/calculator-app:latest
            
            # 运行新容器（映射端口8080）
            docker run -d \
              --name calculator-app \
              -p 8080:8080 \
              --restart unless-stopped \
              ${{ secrets.DOCKERHUB_USERNAME }}/calculator-app:latest
            
            # 清理无用镜像
            docker image prune -f
            
            echo "Deployment completed successfully!"